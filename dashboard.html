<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEX Scaffold Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    padding: 24px;
  }
  h1 { font-size: 24px; margin-bottom: 4px; }
  .subtitle { color: #8b949e; margin-bottom: 24px; font-size: 14px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 20px;
  }
  .card h2 { font-size: 14px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  .stat { font-size: 32px; font-weight: 600; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: #8b949e; font-weight: 500; padding: 8px 12px; border-bottom: 1px solid #30363d; }
  td { padding: 10px 12px; border-bottom: 1px solid #21262d; }
  tr:hover td { background: #1c2128; }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 500;
  }
  .badge-settled { background: #1a3a1a; color: #3fb950; }
  .badge-open { background: #1a2d3a; color: #58a6ff; }
  .badge-done { background: #3a1a1a; color: #f85149; }

  .rep-bar { display: inline-block; height: 8px; border-radius: 4px; background: #1f6feb; margin-right: 8px; vertical-align: middle; }
  .rep-bar-bg { background: #21262d; height: 8px; border-radius: 4px; width: 100px; display: inline-block; vertical-align: middle; }

  .error-msg { color: #f85149; padding: 20px; text-align: center; }
  .loading { color: #8b949e; padding: 20px; text-align: center; }
  .success-msg { color: #3fb950; font-size: 12px; margin-top: 6px; }

  .open-task { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 12px; margin-bottom: 8px; }
  .open-task h3 { font-size: 14px; margin-bottom: 8px; }
  .dag-row { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; font-size: 12px; }
  .dag-price { width: 60px; text-align: right; font-family: monospace; }
  .dag-bar { flex: 1; height: 6px; border-radius: 3px; background: #21262d; }
  .dag-fill { height: 6px; border-radius: 3px; transition: width 0.5s; }
  .dag-name { width: 80px; }

  .refresh { float: right; font-size: 12px; color: #58a6ff; cursor: pointer; text-decoration: none; }
  .refresh:hover { text-decoration: underline; }

  /* Form styles */
  .form-row { display: flex; gap: 12px; align-items: end; flex-wrap: wrap; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 11px; color: #8b949e; text-transform: uppercase; }
  .form-group input, .form-group select {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 8px 12px;
    color: #c9d1d9;
    font-size: 13px;
    outline: none;
    min-width: 100px;
  }
  .form-group input:focus, .form-group select:focus {
    border-color: #58a6ff;
  }
  .form-group input.skill-input { min-width: 70px; width: 70px; }
  .form-group input.budget-input { min-width: 80px; width: 80px; }
  .btn {
    background: #238636;
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    color: #fff;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn:hover { background: #2ea043; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-subtle {
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 8px 16px;
    color: #c9d1d9;
    font-size: 13px;
    cursor: pointer;
  }
  .btn-subtle:hover { background: #30363d; }
  .form-feedback { font-size: 12px; margin-top: 6px; min-height: 18px; }
</style>
</head>
<body>

<h1>AEX Scaffold</h1>
<p class="subtitle">
  <span id="api-url">https://blissful-simplicity-production.up.railway.app</span>
  · <a class="refresh" href="#" onclick="location.reload()">↻ refresh</a>
</p>

<div class="grid" id="stats-grid">
  <div class="card"><h2>Agents</h2><div class="stat" id="stat-agents">—</div></div>
  <div class="card"><h2>Settled Tasks</h2><div class="stat" id="stat-tasks">—</div></div>
  <div class="card"><h2>Open Markets</h2><div class="stat" id="stat-open">—</div></div>
  <div class="card"><h2>Status</h2><div class="stat" id="stat-status">—</div></div>
</div>

<div class="grid" style="grid-template-columns: 1fr 2fr;">
  <!-- Register Agent -->
  <div class="card">
    <h2>Register Agent</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Agent ID</label>
        <input type="text" id="agent-id" placeholder="e.g. my-bot" value="">
      </div>
      <div class="form-group">
        <label>Skill (0–1)</label>
        <input type="number" id="agent-skill" class="skill-input" min="0" max="1" step="0.05" value="0.7">
      </div>
      <button class="btn" onclick="registerAgent()">+ Register</button>
    </div>
    <div class="form-feedback" id="register-feedback"></div>
  </div>

  <!-- Submit Task -->
  <div class="card">
    <h2>Submit Task</h2>
    <div class="form-row">
      <div class="form-group" style="flex:1">
        <label>Goal</label>
        <input type="text" id="task-goal" placeholder="e.g. Audit protocol" value="Analyze DeFi liquidity">
      </div>
      <div class="form-group">
        <label>Budget</label>
        <input type="number" id="task-budget" class="budget-input" min="100" value="300">
      </div>
      <div class="form-group">
        <label>Value</label>
        <input type="number" id="task-value" class="budget-input" min="200" value="1200">
      </div>
      <div class="form-group">
        <label>Class</label>
        <select id="task-class">
          <option value="sharp">sharp</option>
          <option value="onchain">onchain</option>
          <option value="committed">committed</option>
          <option value="ensemble">ensemble</option>
        </select>
      </div>
      <button class="btn" onclick="submitTask()">+ Submit</button>
    </div>
    <div class="form-feedback" id="task-feedback"></div>
  </div>
</div>

<div class="card" style="margin-bottom: 24px;">
  <h2>Agent Leaderboard</h2>
  <div id="agent-table"><div class="loading">Loading...</div></div>
</div>

<div class="card" style="margin-bottom: 24px;">
  <h2>Recent Tasks</h2>
  <div id="tasks-table"><div class="loading">Loading...</div></div>
</div>

<div class="card" style="margin-bottom: 24px;">
  <h2>Open Markets</h2>
  <div id="open-tasks"><div class="loading">Loading...</div></div>
</div>

<div class="card">
  <h2>Bond Activity</h2>
  <div id="bonds-table"><div class="loading">Loading...</div></div>
</div>

<script>
const API = 'https://blissful-simplicity-production.up.railway.app';

async function load() {
  try {
    const [health, agents, tasks] = await Promise.all([
      fetch(API + '/health').then(r => r.json()),
      fetch(API + '/agents').then(r => r.json()),
      fetch(API + '/tasks').then(r => r.json()),
    ]);

    document.getElementById('stat-agents').textContent = health.agents ?? '?';
    document.getElementById('stat-tasks').textContent = health.tasks ?? '?';
    document.getElementById('stat-open').textContent = health.openTasks ?? '?';
    const statusEl = document.getElementById('stat-status');
    statusEl.textContent = health.status ?? '?';
    statusEl.style.color = health.status === 'ok' ? '#3fb950' : '#f85149';

    // Agent leaderboard
    if (Array.isArray(agents) && agents.length) {
      agents.sort((a, b) => (b.reputation ?? 0) - (a.reputation ?? 0));
      let html = `<table><tr><th>Agent</th><th>Skill</th><th>Reputation</th><th>Jobs</th><th>Balance</th></tr>`;
      for (const a of agents) {
        const repPct = Math.round((a.reputation ?? 0) * 100);
        html += `<tr>
          <td><strong>${a.id}</strong></td>
          <td>${(a.skill ?? 0).toFixed(2)}</td>
          <td>
            <span class="rep-bar-bg"><span class="rep-bar" style="width:${repPct}%"></span></span>
            ${repPct}%
          </td>
          <td>${a.jobs ?? 0}</td>
          <td>$${a.balance ?? 0}</td>
        </tr>`;
      }
      html += '</table>';
      document.getElementById('agent-table').innerHTML = html;
    } else {
      document.getElementById('agent-table').innerHTML = '<p style="color:#8b949e">No agents registered</p>';
    }

    // Settled tasks
    if (Array.isArray(tasks) && tasks.length) {
      let html = `<table><tr><th>Task</th><th>Goal</th><th>Class</th><th>Status</th><th>Winner</th><th>Done</th></tr>`;
      for (const t of tasks) {
        const statusBadge = t.status === 'settled'
          ? '<span class="badge badge-settled">settled</span>'
          : '<span class="badge badge-open">open</span>';
        const doneBadge = t.completed
          ? '<span class="badge badge-done">failed</span>'
          : '<span class="badge badge-settled">done</span>';
        const vc = t.verificationClass || 'sharp';
        html += `<tr>
          <td><code>${t.taskId}</code></td>
          <td>${t.goal}</td>
          <td><span class="badge badge-open">${vc}</span></td>
          <td>${statusBadge}</td>
          <td><code>${t.winner ?? '—'}</code></td>
          <td>${doneBadge}</td>
        </tr>`;
      }
      html += '</table>';
      document.getElementById('tasks-table').innerHTML = html;
    } else {
      document.getElementById('tasks-table').innerHTML = '<p style="color:#8b949e">No settled tasks</p>';
    }

    // Open tasks
    if (health.openTasks > 0) {
      let openHtml = '';
      for (let i = health.tasks + 1; i >= 0; i--) {
        try {
          const detail = await fetch(API + `/tasks/task-${i}`).then(r => r.json());
          if (detail.status === 'open' && detail.dags) {
            const dags = Array.isArray(detail.dags) ? detail.dags : [];
            openHtml += `<div class="open-task">
              <h3>${detail.task?.goal || 'Unknown'} <code style="font-size:12px;color:#8b949e">task-${i}</code></h3>`;
            for (const dag of dags) {
              const price = (dag.price ?? detail.prices?.[dag.id] ?? 0.5);
              const pct = Math.round(price * 100);
              const hue = Math.round(120 * price);
              openHtml += `<div class="dag-row">
                <span class="dag-name">${dag.strategy}</span>
                <span class="dag-bar"><span class="dag-fill" style="width:${pct}%;background:hsl(${hue},70%,50%)"></span></span>
                <span class="dag-price">${(price).toFixed(3)}</span>
              </div>`;
            }
            openHtml += `</div>`;
          }
        } catch(e) { /* skip */ }
      }
      document.getElementById('open-tasks').innerHTML = openHtml || '<p style="color:#8b949e">No open tasks with details available</p>';
    } else {
      document.getElementById('open-tasks').innerHTML = '<p style="color:#8b949e">No open markets</p>';
    }

    // Bond activity
    const bondHtml = [];
    if (Array.isArray(tasks) && tasks.length) {
      for (const t of tasks.slice(0, 5)) {
        try {
          const detail = await fetch(API + `/tasks/${t.taskId}`).then(r => r.json());
          const bonds = detail.bonds;
          if (Array.isArray(bonds) && bonds.length > 0) {
            for (const b of bonds) {
              const icon = b.status === 'released' ? '✅' : b.status === 'slashed' ? '❌' : '🔒';
              bondHtml.push(`<div class="dag-row">
                <span>${icon}</span>
                <span style="flex:1"><code>${t.taskId}</code> ${b.agentId}</span>
                <span>\$${b.amount}</span>
                <span style="width:80px;text-align:right">${b.status}</span>
              </div>`);
            }
          }
        } catch(e) { /* skip */ }
      }
    }
    document.getElementById('bonds-table').innerHTML = bondHtml.length
      ? bondHtml.join('')
      : '<p style="color:#8b949e">No bonds recorded — resolve a task to see bond activity</p>';

  } catch(e) {
    document.querySelectorAll('.loading, .stat').forEach(el => el.textContent = 'Error');
    const msg = `<div class="error-msg">Failed to connect: ${e.message}</div>`;
    document.getElementById('agent-table').innerHTML = msg;
    document.getElementById('tasks-table').innerHTML = msg;
    document.getElementById('open-tasks').innerHTML = msg;
  }
}

async function registerAgent() {
  const id = document.getElementById('agent-id').value.trim();
  const skill = parseFloat(document.getElementById('agent-skill').value);
  const fb = document.getElementById('register-feedback');
  if (!id) { fb.innerHTML = '<span style="color:#f85149">Enter an agent ID</span>'; return; }
  if (isNaN(skill) || skill < 0 || skill > 1) { fb.innerHTML = '<span style="color:#f85149">Skill must be 0–1</span>'; return; }
  fb.innerHTML = 'Registering...';
  try {
    const r = await fetch(API + '/agents/register', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({id, skill}),
    });
    const d = await r.json();
    if (d.agent) {
      fb.innerHTML = `<span class="success-msg">✅ ${d.agent.id} registered (skill=${d.agent.skill}, balance=$${d.agent.balance})</span>`;
    } else if (d.error) {
      fb.innerHTML = `<span style="color:#f85149">${d.error}</span>`;
    }
    load();
  } catch(e) {
    fb.innerHTML = `<span style="color:#f85149">${e.message}</span>`;
  }
}

async function submitTask() {
  const goal = document.getElementById('task-goal').value.trim();
  const budget = parseInt(document.getElementById('task-budget').value);
  const value = parseInt(document.getElementById('task-value').value);
  const vc = document.getElementById('task-class').value;
  const fb = document.getElementById('task-feedback');
  if (!goal) { fb.innerHTML = '<span style="color:#f85149">Enter a goal</span>'; return; }
  fb.innerHTML = 'Submitting...';
  try {
    const r = await fetch(API + '/run', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({task: {goal, budget, value, verificationClass: vc}}),
    });
    const d = await r.json();
    if (d.summary) {
      const score = d.outcome?.score?.toFixed(3) ?? '?';
      const winner = d.winner?.strategy ?? '?';
      fb.innerHTML = `<span class="success-msg">✅ ${d.summary.taskId}: winner=${winner} score=${score}</span>`;
    } else if (d.error) {
      fb.innerHTML = `<span style="color:#f85149">${d.error}</span>`;
    }
    load();
  } catch(e) {
    fb.innerHTML = `<span style="color:#f85149">${e.message}</span>`;
  }
}

load();
</script>
</body>
</html>
